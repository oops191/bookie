<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function() {
      var redirect = sessionStorage.getItem("redirect");
      if (redirect) {
        sessionStorage.removeItem("redirect");
        if (redirect !== "/") {
          location.replace(location.origin + "/#" + redirect.replace(/^\//, ""));
        }
      }
    })();
  </script>
</head>
<body>
  <main class="site-main" id="app">
    <div id="view-list" class="view">
      <div class="post-list" id="postList"></div>
    </div>

    <div id="view-post" class="view hidden">
      <article class="post-detail" id="postDetail"></article>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
